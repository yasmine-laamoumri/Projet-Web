<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script type="text/javascript" src="../JS/script.js"></script>
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <img src="../Média/Image/logo.jpeg" alt="logo" width="60">

        <nav>
            <a href="#">Accueil</a>
            <a href="#">Bibliothèque</a>

        <div class="auth-buttons">

    <section class="hero">
        <div class="placeholder-box">
            <img src="../Média/Image/Img2.jpg" alt="Img2">

    </section>

    <section class="banner-click">

    <section class="testimonials">
        <h2>Testimonials</h2>
        <div class="testimonial-grid">

            </div>
        </div>

        <p class="sub-title">Avis Des gens</p>
        <div class="review-stars-grid">
            <div class="review">
                <p>★★★★★</p>
                <span>Max Turner</span>
            </div>
            
            <div class="review">
