<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproduction Wireframe</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script type="text/javascript" src="../JS/script.js"></script>
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <img src="../Média/Image/logo.jpeg" alt="logo" width="60">
        </div>
        <nav>
            <a href="#">Accueil</a>
            <a href="#">Bibliothèque</a>
            <a href="#">À propos</a>
            <a href="#">Contact</a>
        </nav>
        <div class="auth-buttons">
            <button class="btn-outline"></button>
            <button class="btn-outline"></button>
        </div>
    </header>

    <section class="hero">
        <div class="placeholder-box">
            <img src="../Média/Image/Img2.jpg" alt="Img2">
            <button class="small-btn"></button>
        </div>
    </section>

    <section class="banner-click">
        <div class="placeholder-box">
            <img src="../Média/Image/Img1.jpg" alt="Img1">
        </div>
    </section>

    <section class="content-block">
        <div class="placeholder-img"></div>
        <div class="text-side">
            <h2>Titre</h2>
            <button class="small-btn"></button>
        </div>
    </section>

    <section class="content-block reverse">
        <div class="placeholder-img"></div>
        <div class="text-side">
            <h2>Titre</h2>
            <button class="small-btn"></button>
        </div>
    </section>

    <section class="testimonials">
        <h2>Testimonials</h2>
        <div class="testimonial-grid">
            <div class="testimonial-item">
                <div class="placeholder-img-small"></div>
                <p>What’s up, company?</p>
            </div>
            <div class="testimonial-item">
                <div class="placeholder-img-small"></div>
                <p>Piece of butter cake</p>
            </div>
        </div>

        <p class="sub-title">People love this!</p>
        <div class="review-stars-grid">
            <div class="review">
                <p>★★★★★</p>
                <span>Max Turner</span>
            </div>
            <div class="review">
                <p>★★★★★</p>
                <span>Max Turner</span>
            </div>
            <div class="review">
                <p>★★★★★</p>
                <span>Max Turner</span>
            </div>
        </div>
    </section>

    <section class="final-newsletter">
        <h2>Newsletter</h2>
        <input type="text" placeholder="">
        <button class="small-btn"></button>
    </section>

</body>
</html>
